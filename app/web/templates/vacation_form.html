{% extends "base.html" %}

{% block content %}
<section class="section">
  <div class="card form-card">
    <h2 style="font-size:1.4rem; color:var(--text-heading); margin:0 0 1.25rem;">
      {% if vacation %}Edit vacation{% else %}Create vacation{% endif %}
    </h2>

    {% if error %}
      <p class="error-msg">{{ error }}</p>
    {% endif %}

    <form method="post" action="{{ action }}">

      <!-- Basic Info -->
      <fieldset class="fieldset-section">
        <legend class="fieldset-legend">Basic Info</legend>
        <div class="form-grid">
          <div class="form-group">
            <label for="title">Title</label>
            <input type="text" id="title" name="title" value="{{ vacation.title if vacation else '' }}" required placeholder="e.g. Summer in Italy">
          </div>
          <div class="form-grid-2">
            <div class="form-group">
              <label for="status">Status</label>
              <select id="status" name="status">
                <option value="active" {% if not vacation or vacation.status == 'active' %}selected{% endif %}>Active</option>
                <option value="archived" {% if vacation and vacation.status == 'archived' %}selected{% endif %}>Archived</option>
              </select>
            </div>
            <div class="form-group">
              <label for="travelers">Number of travelers</label>
              <input type="number" id="travelers" name="number_of_travelers" min="1" value="{{ vacation.number_of_travelers if vacation else 1 }}" required readonly style="background:#f8fafc; cursor:default;">
            </div>
          </div>
        </div>
      </fieldset>

      <!-- Traveler Details -->
      <fieldset class="fieldset-section">
        <legend class="fieldset-legend">Traveler Details</legend>
        <div class="traveler-editor" id="travelerEditor">
          <!-- Rows rendered by JS from travelers_json or default -->
        </div>
        <button type="button" class="btn-add-traveler" id="addTravelerBtn">
          + Add traveler
        </button>
      </fieldset>

      <!-- Hidden field for backend compatibility -->
      <input type="hidden" id="travelers_json_hidden" name="travelers_json" value="">

      <!-- Route -->
      <fieldset class="fieldset-section">
        <legend class="fieldset-legend">Route</legend>
        <div class="form-grid-2">
          <div class="form-group">
            <label for="origin">Origin</label>
            <input type="text" id="origin" name="origin" value="{{ vacation.origin if vacation else '' }}" required placeholder="e.g. New York (JFK)">
          </div>
          <div class="form-group">
            <label for="destination">Destination</label>
            <input type="text" id="destination" name="destination" value="{{ vacation.destination if vacation else '' }}" required placeholder="e.g. Rome (FCO)">
          </div>
        </div>
      </fieldset>

      <!-- Dates -->
      <fieldset class="fieldset-section">
        <legend class="fieldset-legend">Dates</legend>
        <div class="form-grid">
          <div class="form-group">
            <label for="date_mode">Date mode</label>
            <select id="date_mode" name="date_mode">
              <option value="fixed_dates" {% if not vacation or vacation.date_mode == 'fixed_dates' %}selected{% endif %}>Fixed dates</option>
              <option value="flexible_window" {% if vacation and vacation.date_mode == 'flexible_window' %}selected{% endif %}>Flexible window</option>
            </select>
          </div>
          <div class="form-grid-2">
            <div class="form-group">
              <label for="start_date">Start date</label>
              <input type="date" id="start_date" name="start_date" value="{{ vacation.start_date if vacation and vacation.start_date else '' }}">
            </div>
            <div class="form-group">
              <label for="end_date">End date</label>
              <input type="date" id="end_date" name="end_date" value="{{ vacation.end_date if vacation and vacation.end_date else '' }}">
            </div>
          </div>
          <div class="form-grid-3 form-grid-2">
            <div class="form-group">
              <label for="nights_min">Nights min</label>
              <input type="number" id="nights_min" name="nights_min" min="0" value="{{ vacation.nights_min if vacation and vacation.nights_min is not none else '' }}" placeholder="Optional">
            </div>
            <div class="form-group">
              <label for="nights_target">Nights target</label>
              <input type="number" id="nights_target" name="nights_target" min="0" value="{{ vacation.nights_target if vacation and vacation.nights_target is not none else '' }}" placeholder="Optional">
            </div>
          </div>
          <div class="form-group" style="max-width:200px;">
            <label for="nights_max">Nights max</label>
            <input type="number" id="nights_max" name="nights_max" min="0" value="{{ vacation.nights_max if vacation and vacation.nights_max is not none else '' }}" placeholder="Optional">
          </div>
        </div>
      </fieldset>

      <!-- Services Needed -->
      <fieldset class="fieldset-section">
        <legend class="fieldset-legend">Services Needed</legend>
        <div class="checkbox-pills">
          <span class="checkbox-pill">
            <input type="checkbox" id="hotel_needed" name="hotel_needed" value="true" {% if not vacation or vacation.hotel_needed %}checked{% endif %}>
            <label for="hotel_needed">🏨 Hotel</label>
          </span>
          <span class="checkbox-pill">
            <input type="checkbox" id="airfare_needed" name="airfare_needed" value="true" {% if not vacation or vacation.airfare_needed %}checked{% endif %}>
            <label for="airfare_needed">✈️ Airfare</label>
          </span>
          <span class="checkbox-pill">
            <input type="checkbox" id="rental_car_needed" name="rental_car_needed" value="true" {% if vacation and vacation.rental_car_needed %}checked{% endif %}>
            <label for="rental_car_needed">🚗 Rental car</label>
          </span>
        </div>
      </fieldset>

      <!-- Special Requirements -->
      <fieldset class="fieldset-section">
        <legend class="fieldset-legend">Special Requirements</legend>
        <div class="form-group">
          <label for="special_accommodations">Accommodations &amp; notes</label>
          <textarea id="special_accommodations" name="special_accommodations" rows="3" placeholder="Any dietary needs, accessibility requirements, or special requests...">{{ vacation.special_accommodations if vacation else '' }}</textarea>
        </div>
      </fieldset>

      <!-- Actions -->
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Save</button>
        <a href="/" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</section>

<script>
(function() {
  var editor = document.getElementById('travelerEditor');
  var addBtn = document.getElementById('addTravelerBtn');
  var hiddenField = document.getElementById('travelers_json_hidden');
  var travelersCountInput = document.getElementById('travelers');

  // Parse existing JSON or start with one empty row.
  // Use Jinja2 tojson filter for safe JS embedding (handles quotes, special chars).
  function getInitialTravelers() {
    var raw = {% if vacation and vacation.travelers_json %}{{ vacation.travelers_json | tojson }}{% else %}"[]"{% endif %};
    try {
      if (Array.isArray(raw) && raw.length > 0) {
        return raw.map(function(t) {
          return { name: t.name || '', age: t.age != null ? String(t.age) : '' };
        });
      }
    } catch(e) {}
    return [{ name: '', age: '' }];
  }

  // Read current DOM state into an array of {name, age} objects.
  function collectFromDom() {
    var rows = editor.querySelectorAll('.traveler-row');
    var result = [];
    for (var i = 0; i < rows.length; i++) {
      var nameInput = rows[i].querySelector('input[type="text"]');
      var ageInput = rows[i].querySelector('input[type="number"]');
      result.push({
        name: nameInput ? nameInput.value : '',
        age: ageInput ? ageInput.value : ''
      });
    }
    return result;
  }

  // Render travelers array to DOM. Accepts parameter instead of reading global.
  function renderRows(travelers) {
    editor.innerHTML = '';
    for (var i = 0; i < travelers.length; i++) {
      var t = travelers[i];
      var row = document.createElement('div');
      row.className = 'traveler-row';
      row.dataset.index = i;

      var nameGroup = document.createElement('div');
      nameGroup.className = 'form-group';
      nameGroup.innerHTML = '<label for="traveler_name_' + i + '">Name</label>';
      var nameInput = document.createElement('input');
      nameInput.type = 'text';
      nameInput.id = 'traveler_name_' + i;
      nameInput.name = 'traveler_name_' + i;
      nameInput.value = t.name || '';
      nameInput.placeholder = 'Traveler name';
      nameGroup.appendChild(nameInput);

      var ageGroup = document.createElement('div');
      ageGroup.className = 'form-group';
      ageGroup.innerHTML = '<label for="traveler_age_' + i + '">Age</label>';
      var ageInput = document.createElement('input');
      ageInput.type = 'number';
      ageInput.id = 'traveler_age_' + i;
      ageInput.name = 'traveler_age_' + i;
      ageInput.min = '0';
      ageInput.max = '120';
      ageInput.value = t.age || '';
      ageInput.placeholder = 'Age';
      ageGroup.appendChild(ageInput);

      var removeBtn = document.createElement('button');
      removeBtn.type = 'button';
      removeBtn.className = 'btn-remove-traveler';
      removeBtn.title = 'Remove traveler';
      removeBtn.textContent = '\u2715';
      (function(idx) {
        removeBtn.addEventListener('click', function() { removeTraveler(idx); });
      })(i);

      row.appendChild(nameGroup);
      row.appendChild(ageGroup);
      row.appendChild(removeBtn);
      editor.appendChild(row);
    }
  }

  // Update the readonly traveler count input.
  function updateCount(count) {
    travelersCountInput.value = count;
  }

  // Add a new traveler: read DOM first, then add, then re-render.
  function addTraveler() {
    var travelers = collectFromDom();
    travelers.push({ name: '', age: '' });
    renderRows(travelers);
    updateCount(travelers.length);
  }

  // Remove a traveler: read DOM first, then remove, then re-render.
  function removeTraveler(index) {
    var travelers = collectFromDom();
    if (travelers.length <= 1) return; // keep at least one
    travelers.splice(index, 1);
    renderRows(travelers);
    updateCount(travelers.length);
  }

  // Always read from DOM to ensure hidden field reflects current state.
  function syncHiddenField() {
    var rows = editor.querySelectorAll('.traveler-row');
    var output = [];
    for (var i = 0; i < rows.length; i++) {
      var nameInput = rows[i].querySelector('input[type="text"]');
      var ageInput = rows[i].querySelector('input[type="number"]');
      var nameVal = nameInput ? nameInput.value : '';
      var ageVal = ageInput ? ageInput.value : '';
      output.push({
        name: nameVal,
        age: ageVal !== '' ? parseInt(ageVal, 10) : ''
      });
    }
    hiddenField.value = JSON.stringify(output);
  }

  addBtn.addEventListener('click', addTraveler);
  document.querySelector('form').addEventListener('submit', syncHiddenField);

  // Initial render from parsed JSON or default blank row
  var initial = getInitialTravelers();
  renderRows(initial);
  updateCount(initial.length);
})();
</script>

{% endblock %}
