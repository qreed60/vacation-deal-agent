{% extends "base.html" %}

{% block content %}
<section class="section">
  <div class="card import-card">
    <h2>Import manifest</h2>

    {% if error %}
      <p class="error-msg">{{ error }}</p>
    {% endif %}

    <form method="post" action="/import">
      <div class="form-group">
        <label for="manifest_json">Manifest JSON</label>
        <textarea id="manifest_json" name="manifest_json" rows="16" required placeholder='{\n  "slug": "my-trip",\n  "title": "My Trip",\n  "origin": "New York (JFK)",\n  "destination": "Rome (FCO)",\n  ...\n}'></textarea>
        <p class="form-hint">Paste a vacation manifest JSON below to import it.</p>
      </div>

      <div class="form-actions" style="justify-content:center;">
        <button type="submit" class="btn btn-primary">Import</button>
        <a href="/" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</section>
{% endblock %}
