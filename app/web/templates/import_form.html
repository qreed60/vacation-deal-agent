{% extends "base.html" %}

{% block content %}
<section class="section">
  <h2>Import manifest</h2>
  {% if error %}
    <p class="error">{{ error }}</p>
  {% endif %}
  <form method="post" action="/import" class="form">
    <label>Manifest JSON <textarea name="manifest_json" rows="16" required></textarea></label>
    <button type="submit">Import</button>
  </form>
</section>
{% endblock %}
